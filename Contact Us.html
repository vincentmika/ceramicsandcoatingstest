<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      color: #222;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #f5f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-shell {
      width: min(100%, 900px);
      margin: 2rem 1.25rem 3rem;
      box-sizing: border-box;
    }

    .card {
      background: #fff;
      border: 1px solid #dde2e8;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      padding: 2rem;
    }

    .card h1 {
      margin: 0 0 1rem;
      font-size: 2rem;
      letter-spacing: -0.03em;
      color: #222;
    }

    .card p {
      margin: 0;
      line-height: 1.8;
      color: #434d5a;
      font-size: 1.05rem;
    }

    .card a {
      color: #1f4ed8;
      text-decoration: none;
      font-weight: 600;
    }

    .card a:hover,
    .card a:focus-visible {
      text-decoration: underline;
    }

    @media (max-width: 720px) {
      .page-shell {
        margin: 1rem 1rem 2rem;
      }

      .banner {
        padding: 1.15rem 1rem;
      }

      .banner h1 {
        font-size: 1.8rem;
      }

      .card {
        padding: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="card">
      <h1>Contact Us</h1>
      <p>
        For prospective students, postdocs, or collaborations, please email
        <a href="mailto:centmika@outlook.com" target="_blank" rel="noopener noreferrer">Prof. Ping Xiao</a>
        or
        <a href="mailto:centmika@outlook.com" target="_blank" rel="noopener noreferrer">Prof. Ying Chen</a>.
      </p>
    </div>
  </div>
</body>
</html>
